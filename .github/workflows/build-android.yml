name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK Platform 35
      run: |
        yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses
        ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0"

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-

    - name: Install dependencies
      run: npm ci

    - name: Expo Prebuild
      run: npx expo prebuild --platform android --clean

    - name: Apply Gradle Workarounds for SDK 35
      run: |
        cat << 'EOF' >> android/build.gradle

        subprojects { project ->
            project.plugins.withId('maven-publish') {
                def registerDummy = {
                    def releaseComponent = project.components.findByName('release')
                    if (releaseComponent == null) {
                        def softwareComponentFactory = project.services.get(org.gradle.api.component.SoftwareComponentFactory)
                        def dummyComponent = softwareComponentFactory.adhoc('release')
                        project.components.add(dummyComponent)
                    }
                }
                if (project.state.executed) {
                    registerDummy()
                } else {
                    project.afterEvaluate {
                        registerDummy()
                    }
                }
            }
        }
        EOF

    - name: Build App Bundle (AAB) and APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew clean bundleRelease assembleRelease --no-daemon

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pinc-app-builds
        path: |
          android/app/build/outputs/bundle/release/app-release.aab
          android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30
