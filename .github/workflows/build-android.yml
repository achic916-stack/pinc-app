name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK Platform 35
      run: |
        yes | sdkmanager --licenses
        sdkmanager "platforms;android-35" "build-tools;35.0.0"

    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          gradle-

    - name: Install dependencies
      run: npm ci

    - name: Expo Prebuild
      run: npx expo prebuild --platform android --clean

    - name: Apply Gradle Properties Fixes
      run: |
        echo "android.disableAutomaticComponentCreation=false" >> android/gradle.properties

    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pinc-app-apk
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30
