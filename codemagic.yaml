workflows:
  ios-release:
    name: Pinc iOS Release (TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Apple Key
    environment:
      vars:
        BUNDLE_ID: "com.achic.pinc"
        XCODE_WORKSPACE: "ios/pinc.xcworkspace"
        XCODE_SCHEME: "pinc"
        APP_STORE_APP_ID: "6777288825"
      groups:
        - pinc_env_vars
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.achic.pinc
      node: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true
    scripts:
      - name: Install node modules
        script: npm install
      - name: Expo Prebuild
        script: npx expo prebuild --platform ios --clean --no-install
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Set up keychain
        script: keychain initialize

      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Build iOS for distribution
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/pinc.xcarchive" \
            archive \
            | xcpretty
      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/pinc.xcarchive" \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath "$CM_BUILD_DIR/ipa" \
            | xcpretty
    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
