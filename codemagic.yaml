workflows:
  ios-release:
    name: Pinc iOS Release (TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Apple Key
    environment:
      vars:
        BUNDLE_ID: "com.achic.pinc"
        XCODE_WORKSPACE: "ios/pinc.xcworkspace"
        XCODE_SCHEME: "pinc"
        APP_STORE_APP_ID: "6777288825"
      groups:
        - pinc_env_vars
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.achic.pinc
      node: latest
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true
          source: true
    scripts:
      - name: Install node modules
        script: npm install
      - name: Expo Prebuild
        script: npx expo prebuild --platform ios --clean --no-install
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Set NODE_BINARY for Xcode script phases
        script: |
          sudo ln -sf $(which node) /usr/local/bin/node
          echo "export NODE_BINARY=$(which node)" > ios/.xcode.env.local
      - name: Set up keychain
        script: keychain initialize

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Build iOS for distribution
        script: |
          set -e
          if ! xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$CM_BUILD_DIR/pinc.xcarchive" \
            archive > build.log 2>&1; then
            echo "❌ BUILD FAILED! Extracting errors from log:"
            echo "======================================"
            grep -B 30 "PhaseScriptExecution.*failed" build.log || true
            echo "======================================"
            grep -A 5 -B 5 "error: " build.log || true
            echo "======================================"
            exit 1
          fi
      - name: Export IPA
        script: |
          set -e
          set -o pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/pinc.xcarchive" \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath "$CM_BUILD_DIR/ipa" \
            | xcpretty
    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - build.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
